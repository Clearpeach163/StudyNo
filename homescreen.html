
<!doctype html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>StudyNo</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
<style>
  body {
    max-width: 580px;
    margin: 0 auto;
    padding: 24px;
    font-family: sans-serif;
    color: white;
  }

  h1 {
    text-align: center;
        font-size:clamp(1.5rem,4vw,3.5rem);
  }

  .language {
    margin-bottom: 8px;
        background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(14px) saturate(160%);
  -webkit-backdrop-filter: blur(14px) saturate(160%);

  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 16px;

  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.25),
    inset 0 1px 0 rgba(255, 255, 255, 0.2);
    border-radius: 19px;
    padding: 2%;
    animation: fadeIn_home 0.5s ease forwards;
    transition: all 0.3s ease;
  }
@keyframes fadeIn_home {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
@keyframes fadeIn_homeback {
  from {
    opacity: 0;
    transform: translateY(-40px);
  }
  to {
    opacity: 1;
    transform: translateY(0px);
  }
}
.language:hover {
    translate: 0px -3px;
}

  summary {
    padding: 12px;
    cursor: pointer;
    list-style: none;
    display: flex;
    justify-content: space-between;
  }
  summary::-webkit-details-marker { display: none; }

  .grades {
    display: flex;
    gap: 8px;
    padding: 7px;
    padding-left: 7px;
    margin: 12px;
    margin-bottom: 8px;
    text-align: center;
    overflow-x: auto;
    

    border-radius: 888px;

    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.136),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);


      animation: fadeIn_home 0.5s ease forwards;
      transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .grades:hover {
    translate: 0px -3px;
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.472),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);

  }
  .grade{
    padding: 4px 10px;
    cursor: pointer;

    border-radius: 16px;

    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0);



      animation: fadeIn_home 0.1s ease forwards;
      transition: all 0.3s ease;
 
  }
  .grade:hover {
    translate: 0px -1px;
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.472),
      inset 0 1px 0 rgba(255, 255, 255, 0.113);

  }

  .grade.active {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);

    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 16px;

    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);


      animation: fadeIn_home 0.1s ease forwards;
      transition: all 0.3s ease;
  }

  .chapters {
    padding: 0 12px 12px;
  }

  .chapter {
    display: flex;
    gap: 10px;
    padding: 8px 0;
  }

  .chapter.hidden {
    display: none;
  }

  .chapter .num {
    width: 16px;
  }

.chapter .title {
  flex: 1;
  position: relative; /* Needed */
  text-decoration: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.chapter .title::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -1px;
  width: 0;
  
  height: 2px;
  background: linear-gradient(90deg,rgba(155, 109, 173, 0.66) 0%, rgba(124, 83, 237, 0) 100%); /* Give it a color */
  transition: width 0.25s ease;
}

.chapter .title:hover::after {
  width: 90%;
}
  button {
    width: 100%;
    border-radius: 999px;
       margin-bottom: 8px;
        background: rgba(157, 61, 201, 0.075);
    backdrop-filter: blur(3px) saturate(90%);
    -webkit-backdrop-filter: blur(3px) saturate(90%);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.242);;
    border-radius: 19px;
    padding: 2%;
 
    animation: fadeIn_home 0.5s ease forwards;
       animation-delay: 0.3s;
    animation-fill-mode: both;
    transition: all 0.3s ease;
    padding: 8px;
  }

      
  
  #chooselang {
        opacity: 0.6;
        text-align: center;
        padding: 5px;
        font-size:clamp(1rem,0vw,1rem);
  }
  .mainmenu {
       margin-bottom: 8px;
        background: rgba(107, 107, 107, 0.054);
  backdrop-filter: blur(14px) saturate(120%);
  -webkit-backdrop-filter: blur(14px) saturate(120%);

  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 16px;

  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.25),
    inset 0 1px 0 rgba(255, 255, 255, 0.2);
    border-radius: 19px;
    padding: 2%;
    animation: fadeIn_home 0.5s ease forwards;
    transition: all 0.3s ease;

  }
  .language-name {
    font-weight: bold;
    font-size:clamp(1rem,4vw,1.5rem);
    top: 0;
    
}
.language-description {
    font-size:clamp(0.8rem,4vw,1rem);
    opacity: 0.6;

    position: absolute;
}
.klas-selecttext {
    font-size:clamp(0.8rem,4vw,1rem);
    opacity: 0.6;
    top: 100px;
    position: absolute;
}
#stripe {
    height: 1px;
    width: 90%;
    top: 70px;
    border: none;
    position: absolute;
    background: rgba(255, 255, 255, 0.587);
    border-radius: 10px;    
}
a {
    color: white;
}
</style>
</head>
<body>

  <h1>StudyNo</h1>
  <p id="chooselang">Choose a language to continue</p>
<div class="mainmenu">
  <!-- FRANS -->
  <div class="language">
    <details open>
      <summary>
     
        <p class="language-name">Frans</p>
        <span class="language-description">6 leerjaren</span>
 
  
    </summary>
        
      <div class="grades" data-grades>
        <span class="grade active" data-grade="1">1e</span>
        <span class="grade" data-grade="2">2e</span>
        <span class="grade" data-grade="3">3e</span>
        <span class="grade" data-grade="4">4e</span>
        <span class="grade" data-grade="5">5e</span>
        <span class="grade" data-grade="6">6e</span>
      </div>
      <div class="chapters" data-chapters>
        <div class="chapter" data-grade="1">
          <span class="num">1</span><a onclick="setlist('fr_marche7');" class="title">Marche 7 woordgroep</a><span class="count">38 woorden</span>
        </div>
        <div class="chapter" data-grade="1">
          <span class="num">2</span><a onclick="setlist('fr_marche7_fix');" class="title">marche 7 fix</a><span class="count">45 woorden</span>
        </div>
        <div class="chapter" data-grade="1">
          <span class="num">3</span><a onclick="setlist('fr_marche8');" class="title">Marche 8 woordgroep</a><span class="count">52 woorden</span>
        </div>
        <div class="chapter" data-grade="1">
          <span class="num">1</span><a class="title" onclick="setlist('fr_marche8_fix');">Marche 8 fix</a><span class="count">41 woorden</span>
        </div>
        
      </div>

      <button data-show-all>Toon alle hoofdstukken</button>
    </details>
  </div>
 

  <!-- ENGELS -->
  
<script>
  // grade tab switching: click a grade -> show only chapters with matching data-grade
  document.querySelectorAll('[data-grades]').forEach(function (gradeBar) {
    var chaptersBox = gradeBar.parentElement.querySelector('[data-chapters]');
    gradeBar.addEventListener('click', function (e) {
      var target = e.target.closest('.grade');
      if (!target) return;

      gradeBar.querySelectorAll('.grade').forEach(function (g) {
        g.classList.toggle('active', g === target);
      });

      var grade = target.dataset.grade;
      chaptersBox.querySelectorAll('.chapter').forEach(function (ch) {
        ch.classList.toggle('hidden', ch.dataset.grade !== grade);
      });
    });
  });

  // show-all button: reveals chapters past the first 4 in that language
  document.querySelectorAll('[data-show-all]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var box = btn.previousElementSibling;
      box.querySelectorAll('.chapter:not(.hidden)').forEach(function (ch, i) {
        if (i >= 4) ch.style.display = 'flex';
      });
      btn.style.display = 'none';
    });
  });

  // initial state: hide chapters beyond the 4th in the visible grade
  document.querySelectorAll('[data-chapters]').forEach(function (box) {
    box.querySelectorAll('.chapter:not(.hidden)').forEach(function (ch, i) {
      if (i >= 4) ch.style.display = 'none';
    });
  });
</script>

</body>
</html>
