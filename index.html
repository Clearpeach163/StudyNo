<body>
    <!-- Loading Screen -->
<div id="loader" style="
  position: fixed; inset: 0; z-index: 9999;
  background: #0a0a0f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2rem; font-family: sans-serif;
  transition: opacity 0.6s ease;
">
  <div style="position: relative; width: 64px; height: 64px;">
    <div style="position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:#7F77DD;animation:spin 1s linear infinite;"></div>
    <div style="position:absolute;inset:8px;border-radius:50%;border:2px solid transparent;border-top-color:#ff00dd;animation:spin 0.75s linear infinite reverse;"></div>
  </div>
  <div style="text-align: center;">
    <p id="load-msg" style="color:#ffffffcc;font-size:15px;margin:0 0 8px;letter-spacing:.05em;">Loading…</p>
    <div style="width:180px;height:2px;background:#ffffff18;border-radius:2px;overflow:hidden;">
      <div id="load-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#7F77DD,#bf5dca);border-radius:2px;transition:width .3s ease;"></div>
    </div>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="loading.js"></script>
