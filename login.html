<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Inloggen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="login">

    <h1 id="login-title">Welkom terug</h1>
    <p id="login-subtitle">Log in om verder te gaan.</p>

    <input id="liUser" placeholder="Gebruikersnaam">
    <input id="liPass" type="password" placeholder="Wachtwoord">

    <button id="loginButton" onclick="login()">Inloggen</button>

    <p id="status"></p>

    <p id="login-footer">
        Nog geen account?
        <a id="signupLink" href="signup.html">Account aanmaken</a>
    </p>

</div>

<script src="login.js"></script>

</body>
</html>
